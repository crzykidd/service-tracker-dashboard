# settings.example.yml
# This is the settings for for STD (Service Tracker Dashboard)
# Any ENV variables set will be used before the entry in this config file.

# Backup file location.   Make sure this is mountable in from your container.  
# Can be set with ENV BACKUP_PATH=/config/backups
backup_path: /config/backups
backup_days_to_keep: 7

# API Token for connections
# Can be set with ENV API_TOKEN=supersecrettoken
api_token: supersecrettoken

# URL for dozzle instance for quick connect to logs
# Can be set with ENV STD_DOZZLE_URL
# If you set this a tools section will show up in your
# dashboard. 
#std_dozzle_url: http://dozzle.host.com:8080

# How often (in seconds) the background loop tests the configured URLs.
url_healthcheck_interval: 300

# How often do we reload the widget data default 300 seconds
widget_background_reload: 900

# Number of days of widget value history to retain. Rows in the
# widget_value table whose last_updated is older than this are
# deleted by a daily background job (00:15 server local time).
widget_value_retention_days: 30

# How to handle conflicts between user UI edits and incoming notifier
# registers for the same service:
#   user_wins     — UI edits stick; the notifier won't overwrite
#                   user-overridable fields (group_name, sort_priority)
#                   on existing rows. Default.
#   notifier_wins — Every notifier register overwrites everything,
#                   including UI edits. Choose this if your container
#                   labels are the source of truth and you don't want
#                   UI edits to persist across notifier updates.
# Regardless of which mode is set, the notifier_reported_* columns
# always capture what the notifier most recently sent.
register_field_ownership: user_wins

# how long to default the user session, default is 120 minutes
# can be set as USER_SESSION_LENGTH in ENV
user_session_length: 120
